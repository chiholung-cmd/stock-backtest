services:
  - type: web
    name: stock-backtest
    runtime: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Required: MySQL/TiDB connection string (e.g. mysql://user:pass@host:3306/dbname)
      - key: JWT_SECRET
        generateValue: true   # Auto-generated random secret for session signing
